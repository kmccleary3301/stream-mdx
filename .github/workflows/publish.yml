name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm-publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Update npm (for trusted publishing)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Pack + install smoke (Next + Vite)
        run: npm run ci:pack-smoke

      - name: Release gates (analyzer + regression + perf)
        run: npm run release:gates

      - name: Publish (Changesets)
        run: npm run changeset:publish
